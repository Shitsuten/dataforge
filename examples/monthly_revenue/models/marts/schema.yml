version: 2

models:
  - name: monthly_revenue_by_category
    description: >
      Monthly revenue aggregated by product category and vendor, with refund handling.
      Joins Stripe payments with Shopify orders and products to produce a complete
      revenue picture. Generated by DataForge using metadata from DataHub.
    meta:
      datahub_sources:
        - raw.stripe.payments
        - raw.shopify.orders
        - raw.shopify.products
      generated_by: dataforge
    columns:
      - name: revenue_month
        description: First day of the revenue month
        tests:
          - not_null
      - name: product_category
        description: Product category from Shopify catalog (defaults to 'Uncategorized')
        tests:
          - not_null
      - name: vendor
        description: Product vendor/brand from Shopify
      - name: order_count
        description: Number of distinct orders in this month/category
        tests:
          - not_null
      - name: units_sold
        description: Total quantity of items sold
        tests:
          - not_null
      - name: gross_revenue
        description: Total revenue before refunds
        tests:
          - not_null
      - name: refunds
        description: Total refund amount for the month (0 if none)
        tests:
          - not_null
      - name: net_revenue
        description: Gross revenue minus refunds
        tests:
          - not_null
