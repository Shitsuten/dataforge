services:
  dataforge:
    build: .
    environment:
      - DATAHUB_GMS_URL=${DATAHUB_GMS_URL:-}
      - DATAHUB_GMS_TOKEN=${DATAHUB_GMS_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATAFORGE_MODEL=${DATAFORGE_MODEL:-claude-sonnet-4-20250514}
    volumes:
      - ./output:/app/output
    command: >
      generate "Monthly revenue by product category"
      --type dbt
      --output-dir /app/output

  mcp-server:
    build: .
    environment:
      - DATAHUB_GMS_URL=${DATAHUB_GMS_URL:-}
      - DATAHUB_GMS_TOKEN=${DATAHUB_GMS_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATAFORGE_MODEL=${DATAFORGE_MODEL:-claude-sonnet-4-20250514}
    entrypoint: ["python", "-m", "dataforge.server"]
    stdin_open: true
